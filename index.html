### 3. 섹션 구분자

강의록에서 논리적 섹션을 구분하고 싶을 때 섹션 구분자를 사용할 수 있습니다.

#### 사용법
\`\`\`markdown
---section---
\`\`\`

#### 렌더링 결과
- 가로 그라데이션 라인과 함께 "SECTION" 텍스트가 중앙에 표시됩니다
- 섹션 간 명확한 시각적 구분을 제공합니다

#### 활용 예시
\`\`\`markdown
## 이론 설명

Stable Diffusion의 기본 원리를 설명합니다...

---section---

## 실습

이제 직접 실습해봅시다...

---section---

## 정리

오늘 배운 내용을 정리하면...
\`\`\`

#### 주의사항
- 일반 수평선(\`---\`)과는 다른 용도입니다
- 일반 수평선: 단순 구분선
- 섹션 구분자(\`---section---\`): 강조된 섹션 전환

### 4. 문서 작성 주의사항

#### 반드시 지켜야 할 규칙
- **이모지 사용 금지**: 강의록에는 이모지를 절대 사용하지 않음
- **간결한 문장**: 핵심만 명확하게 전달
- **실습 중심**: 이론보다 실제 사용법 위주
- **코드블록 활용**: 복사가 필요한 내용은 반드시 코드블록으로

#### 권장사항
- 각 Step은 5-10분 분량으로 작성
- 스크린샷보다 텍스트 설명 선호
- 단계별 설명은 번호 리스트 사용
- 중요 내용은 **볼드** 처리

[[image: 슬라이드7.PNG]]`,"session1/step10-ksampler.md":`# KSampler란?

---section---

[[image: ksampler.PNG]]

K-Sampler는 AI 이미지 생성의 핵심 엔진으로, 노이즈를 점진적으로 제거하며 텍스트 프롬프트에 따라 이미지를 형성하는 과정을 제어합니다.

### K-Sampler 기본 개념

#### 이미지 생성 원리
\`\`\`principle
1. 랜덤 노이즈에서 시작
2. 단계별로 노이즈 제거
3. 프롬프트에 따라 픽셀 예측
4. 최종 이미지 완성
\`\`\`

K-Sampler는 이 과정에서 각 단계의 세부사항을 제어하여 원하는 품질과 스타일의 이미지를 생성합니다.

---section---

### 시드(Seed)란?

시드는 이미지 생성의 시작점을 결정하는 값으로, **noise의 패턴을 seed가 결정**합니다.
동일한 시드 값을 사용하면 재현 가능한 결과를 만들 수 있습니다.

#### 시드 값의 의미
\`\`\`seed
-1: 랜덤 (매번 다른 결과)
0 이상: 고정값 (동일한 결과 재현)
\`\`\`

#### control_after_generate 옵션
생성 후 시드 값의 자동 변경을 제어합니다.

\`\`\`options
randomize: 생성 후 자동으로 새 seed
fixed: seed 값 유지 (재현 작업에 유용)
increment: seed 값 1씩 증가 (연작 제작)
decrement: seed 값 1씩 감소
\`\`\`

---section---

### Steps란?

Steps는 노이즈 제거 단계의 수로, 이미지의 품질과 생성 속도에 직접적인 영향을 미칩니다.

Steps 매개변수는 샘플러가 수행할 디노이징 반복 횟수를 지정합니다. 더 많은 스텝은 모델이 이미지를 더욱 세밀하게 수정하고 개선할 기회를 제공하여 일반적으로 더 높은 품질의 이미지를 생성하지만, 그만큼 처리 시간도 증가합니다. 이미지 품질과 생성 속도 사이에서 균형을 맞추기 위해 스텝 값을 조정하는 것이 중요합니다.

[[image: consistency-models.png]]

#### 권장 설정값
\`\`\`recommendation
권장 범위: 15~30 스텝
\`\`\`

---section---

### CFG란?

CFG(Classifier Free Guidance)는 생성된 이미지가 프롬프트를 얼마나 충실히 따를지를 결정하는 매개변수입니다.

#### CFG 값에 따른 프롬프트 준수 정도
\`\`\`cfg
1-4: 창의적, 프롬프트를 느슨하게 해석
5-7: 균형잡힌 설정 (권장 범위)
8-12: 프롬프트를 강하게 따름
13-20: 과포화, 부자연스러운 결과
\`\`\`

---section---

## 샘플러(Sampler)와 스케줄러(Scheduler)란?

### 샘플러와 스케줄러 기본 개념

샘플러(Sampler)는 노이즈 제거 알고리즘을 선택하는 요소이고, 스케줄러(Scheduler)는 각 스텝에서 노이즈 제거량을 조절하는 방식을 결정합니다.

\`\`\`concepts
샘플러(Sampler):
- 노이즈를 이미지로 변환하는 알고리즘
- 생성 품질과 속도에 직접적 영향
- 수렴형과 비수렴형으로 분류

스케줄러(Scheduler):  
- 각 단계별 노이즈 제거량 결정
- 이미지 품질과 특성에 영향
- 샘플러와 조합으로 최적화 가능
\`\`\`

#### 샘플러와 스케줄러의 관계
\`\`\`relationship
샘플러: "어떤 방식으로" 노이즈를 제거할지 결정
스케줄러: "언제 얼마나" 노이즈를 제거할지 결정

예시:
- DPM++ 2M (샘플러) + Karras (스케줄러) = 후반부 집중 고품질 처리
- Euler (샘플러) + Normal (스케줄러) = 균등한 빠른 처리
\`\`\`

---section---

### 샘플러 종류

\`\`\`samplers
dpm++ sde karras: 최고 품질 작업
dpm++ 2m karras: 균형잡힌 고품질
ddim: 재현성 중요 작업
euler: 빠른 테스트
euler_a: 창의적 생성
dpm2 a: 실험적 작업
\`\`\`

---section---

### 스케줄러 종류

\`\`\`schedulers
normal: 균등한 노이즈 제거 - 모든 스텝에서 동일한 양의 노이즈를 제거하는 기본 방식
karras: 후반부 집중 고품질 - 작은 타임스텝에 더 많은 시간을 할애하여 세밀한 디테일 향상
simple: 선형적 안정 처리 - 단순하고 안정적인 선형 노이즈 스케줄 적용
sgm_uniform: 매끄러운 결과 - 균일한 분포로 부드러운 그라데이션 생성
ddim_uniform: 완전한 재현성 - DDIM 방식의 균일한 스케줄로 동일한 결과 보장
exponential: 빠른 구조 형성 - 지수적으로 노이즈를 감소시켜 초반 구조를 빠르게 형성
beta: 정밀한 제어 - 베타 분포 기반의 세밀한 노이즈 제어
cosine: 자연스러운 변화 - 코사인 함수 기반으로 자연스러운 노이즈 감소 곡선 제공
\`\`\`

`,"session1/step2-ai-generation-principles.md":`# AI 이미지 생성원리와 Stable Diffusion 개론

## 학습 목표
이번 단계에서는 AI가 어떻게 이미지를 생성하는지 그 원리를 이해하고, Stable Diffusion이라는 강력한 도구에 대해 알아보겠습니다. 복잡해 보이는 AI 기술을 친근한 예시로 쉽게 이해해보세요!

---section---

## AI는 정말 "생각"하고 있을까?

### AI의 진짜 정체
많은 사람들이 AI가 사람처럼 생각한다고 오해하지만, 사실 AI는 **생각하지 않습니다**. 대신 AI는 엄청난 양의 학습된 데이터에서 **패턴을 찾는 천재**입니다.

### 숫자 예측 게임으로 이해하기
"1, 2, 3, 4 다음에 올 숫자는?"이라는 질문을 받았을 때:
- 사람: "규칙을 생각해보니 5가 와야겠네!"
- AI: 미리 준비된 상자에서 쪽지를 뽑습니다
  - 99개 쪽지: "5"
  - 1개 쪽지: "4" (가끔 패턴이 깨지는 경우를 학습했기 때문)

[[image: human-question.PNG]]
[[image: ai-question.PNG]]

### 이어말하기 게임으로 쉽게 이해하기
AI를 **고성능 이어말하기 기계**라고 생각해보세요:
- "오늘 날씨가..." → "좋네요!"
- "맛있는 음식을..." → "먹고 싶어요!"

AI는 앞의 단어들을 보고 가장 적절한 다음 단어를 선택하는 것과 같습니다.

[[image: word-chain.PNG]]

---section---

## AI는 어떻게 학습할까?

### 1. 지도학습 (Supervised Learning)
**선생님이 정답을 알려주면서 가르치는 방법**
- 예: "이 사진은 고양이야", "이 사진은 강아지야"
- AI: "아, 털이 부드럽고 수염이 있으면 고양이구나!"

### 2. 강화학습 (Reinforcement Learning)
**업다운 게임처럼 힌트를 주면서 가르치는 방법**
- AI가 답을 제시하면 "더 높아", "더 낮아", "정답!" 같은 피드백
- 점진적으로 정답에 가까워지도록 학습

---section---

## 이미지 생성의 비밀: 디노이징

### 이미지는 사실 숫자들의 집합
- 이미지 = **픽셀들의 2차원 수열**
- 각 픽셀은 색깔 정보를 담은 숫자
- AI에게 이미지는 그냥 숫자 패턴일 뿐!

[[image: 2d-array.PNG]]

### 디노이징: 얼룩 지우기 게임
AI 이미지 생성의 핵심 원리를 간단히 설명하면:

1. **얼룩 묻히기**: 깨끗한 이미지에 의도적으로 노이즈(얼룩) 추가
2. **복원하기**: AI가 얼룩을 제거해서 원본 복원 시도
3. **비교하기**: 원본과 얼마나 유사한지 확인
4. **반복하기**: 이 과정을 수백만 번 반복

[[image: denoising1.PNG]]
[[image: denoising2.PNG]]
[[image: denoising3.PNG]]
[[image: denoising4.PNG]]
[[image: denoising5.PNG]]

### 학습 과정
- 처음엔 서툴게 복원하다가 점점 실력 향상
- 패턴과 방향성을 파악하여 학습
- 결국 **완전한 노이즈 이미지**도 의미 있는 이미지로 복원 가능!

---section---

### 실제 사용할 때
- 완전한 노이즈 이미지를 AI에게 보여주며
- "이건 노이즈가 섞인 이미지야, 복원해줘!"라고 요청
- AI는 열심히 "복원"하는데, 사실은 새로운 이미지를 생성하는 것!

좌측 패널은 다양한 도구와 라이브러리를 제공합니다:

#### 1. Node Library (노드 라이브러리)
사용 가능한 모든 노드들의 목록입니다.  
카테고리별로 정리되어 있어 필요한 노드를 쉽게 찾을 수 있습니다.

#### 2. Model Library (모델 라이브러리)
설치된 체크포인트, LoRA, VAE 등의 모델 목록입니다.

저장된 워크플로우 파일들입니다.  
JSON 형식으로 저장되며, 노드 구성과 연결 정보를 포함합니다.

#### 4. Node Maps (노드 맵)
현재 작업 공간의 노드들을 미니맵으로 표시합니다.  
복잡한 워크플로우에서 전체 구조를 파악하는 데 유용합니다.

#### 5. Queue (실행 대기열)
이미지 생성 작업의 진행 상황을 표시합니다.  
완료된 작업과 대기 중인 작업을 확인할 수 있습니다.

## Default 템플릿으로 첫 이미지 생성하기

ComfyUI를 처음 실행하면 기본 워크플로우(Default Template)가 이미 로드되어 있습니다.
별도로 템플릿을 불러올 필요 없이 바로 이미지 생성을 시작할 수 있습니다.

### 기본 상태 그대로 실행하기

1. 화면에 표시된 기본 노드 구성을 확인하세요
2. 프롬프트를 수정하지 않고 현재 상태 그대로 유지합니다
3. 우측 하단의 **"Queue Prompt"** 버튼을 클릭하여 생성을 시작하세요

이렇게 기본 설정만으로도 첫 이미지 생성이 가능합니다!

## 기본 워크플로우 구조 이해

### 필수 노드들

기본 이미지 생성에 필요한 핵심 노드들:

\`\`\`settings

2. CLIP Text Encode (긍정): 긍정 프롬프트
3. CLIP Text Encode (부정): 부정 프롬프트

### 노드 연결 흐름

데이터가 흐르는 순서를 이해하는 것이 중요합니다:

2. **CLIP** → 긍정/부정 Text Encode 노드로 연결
3. **Text Encode** → KSampler의 조건 입력으로 연결
4. **Empty Latent** → KSampler의 latent 입력으로 연결

### 3. Flux 테스트

Flux는 최신 세대 모델로, 고품질 이미지와 뛰어난 프롬프트 이해력을 제공합니다.

1. **좌측 사이드바 템플릿 아이콘** 클릭 → 템플릿 패널 열기

### Flux의 특징: 향상된 텍스트 인코더

Flux 모델은 기존 SD 모델과 다른 텍스트 인코더 구조를 사용합니다.

#### CLIP vs T5-XXL 인코더

기존 Stable Diffusion 모델들은 주로 **CLIP 인코더**를 사용합니다:
- CLIP은 이미지와 텍스트를 연결하는 임베딩 모델
- 키워드 중심의 프롬프트 이해에 최적화
- 단순한 문장 구조에 강점

**CLIP의 한계**:
예를 들어 CLIP 기반 모델은 다음 두 문장을 구분하기 어렵습니다:
- "A dog chasing a man" (개가 사람을 쫓는 중)
- "A man chasing a dog" (사람이 개를 쫓는 중)

**Flux의 개선점**:
Flux는 CLIP과 함께 **T5-XXL 인코더**를 사용합니다:
- T5-XXL은 11B 파라미터급 대형 언어 모델
- 원래 문장 의미 이해와 변환에 특화
- 완전한 문장/단락을 "의미 단위"로 임베딩 가능
- 복잡한 문맥과 관계를 정확하게 이해

#### 템플릿 프롬프트 예시

템플릿에 포함된 프롬프트를 살펴보면 두 인코더의 역할을 알 수 있습니다:

**CLIP 인코더 (clip_l) 입력**:
\`\`\`prompt
Cute retro mini car, pastel-colored 3D flowers overflowing from it,
soft green background, minimalist and fresh style, high-precision rendering,
spring-like vibrant atmosphere, delicate petal details, gentle color grading,
whimsical and lovely scene.
\`\`\`
키워드 중심의 간결한 설명

**T5 인코더 (t5xxl) 입력**:
\`\`\`prompt
Create a 3D-styled image: A cute, retro-looking mini car with soft,
pastel-colored flowers (like daisies, pink blooms) overflowing from it.
Set against a gentle green background, giving a fresh, spring-vibe.
Make it look whimsical and delicate, like a sweet illustration.
\`\`\`
자연어 문장으로 된 상세한 설명

이처럼 Flux는 두 인코더를 함께 사용하여 키워드와 문맥을 모두 이해하며, 더욱 정확한 이미지를 생성합니다.

## Illustrious-XL 모델 실습

### 파인튜닝(Fine-tuning)이란?

**Illustrious-XL**을 이해하려면 먼저 파인튜닝 개념을 알아야 합니다.

파인튜닝이란 이미 학습된 대형 모델(베이스 모델)을 특정 목적에 맞게 **추가 학습**시키는 기법입니다.

\`\`\`settings
베이스 모델 (SDXL)
  └─ 수백만 장의 이미지로 학습된 범용 모델
     └─ 파인튜닝
        ├─ 애니메이션 이미지 위주 추가 학습 → Illustrious-XL
        ├─ 사진 리얼리즘 위주 추가 학습 → RealVisXL
        └─ 특정 작가 스타일 학습 → 스타일 특화 모델
\`\`\`

베이스 모델의 방대한 지식은 그대로 유지하면서, 특정 도메인의 표현력을 강화할 수 있습니다.
Civitai 등 커뮤니티에서 배포되는 대부분의 체크포인트가 이 파인튜닝 방식으로 제작됩니다.

## LoRA(Low-Rank Adaptation)란?

LoRA는 체크포인트 모델을 수정하지 않고도 새로운 스타일이나 캐릭터를 학습시킬 수 있는 기술입니다.  
기존 모델에 '추가 레이어'를 더하는 방식으로, 원본을 건드리지 않으면서도 새로운 기능을 부여합니다.

## 로라 기본 개념

### 체크포인트 vs LoRA 비교

\`\`\`comparison
체크포인트 모델:
- 기본 토대 (집의 기초 구조)
- 전체적인 스타일 결정
- 용량: 2~12GB
- 교체 시: 완전히 다른 결과

LoRA 모델:
- 추가 장식 (집의 인테리어)

## Image to Image란?

Image to Image(Img2Img)는 기존 이미지를 참조하여 새로운 이미지를 생성하는 기법입니다.
Text to Image와 유사하지만, 참조 이미지를 조건으로 추가하여 더욱 정밀한 제어가 가능합니다.

### Image to Image의 활용
- 사진을 애니메이션 스타일로 변환
- 스케치를 완성된 이미지로 변환
- 이미지 복원 및 화질 개선
- 흑백 이미지 컬러화

## ControlNet 개념 이해

ControlNet은 Stable Diffusion의 이미지 생성 과정에 **추가 조건을 부여**하여 정밀한 제어를 가능하게 만드는 신경망 구조입니다.

### 왜 ControlNet이 필요한가?

기존 Stable Diffusion은 텍스트 프롬프트만으로 이미지를 생성하기 때문에:
- 원하는 구도를 정확히 만들기 어려움
- 특정 포즈나 형태를 지정하기 힘듦
- 결과물의 일관성 유지가 어려움

ControlNet은 이러한 문제를 **시각적 가이드**를 통해 해결합니다.

---

## ControlNet 작동 원리

### 핵심 메커니즘

\`\`\`settings
원본 모델 가중치: 잠금 상태로 보존
ControlNet 가중치: 학습 가능한 복사본
Zero Convolution: 두 가중치를 연결하는 특수 레이어
\`\`\`

**Zero Convolution**은 초기값이 0으로 설정되어, 학습 과정에서 점진적으로 최적값으로 진화합니다. 이를 통해 원본 Stable Diffusion 모델은 그대로 유지되면서도 새로운 조건을 학습할 수 있습니다.

### 입력 처리 방식

\`\`\`settings
텍스트 프롬프트 + 추가 조건 이미지 = 정밀한 이미지 생성
\`\`\`

추가 조건은 다양한 형태로 제공됩니다:
- Edge maps (엣지 맵)
- Human poses (인체 포즈)
- Depth maps (깊이 맵)
- Segmentation masks (세그멘테이션 마스크)
- Hand-drawn sketches (손그림 스케치)

---

## 주요 ControlNet 유형 비교

### 1. Canny
\`\`\`settings
특징: 샤프한 엣지 검출
용도: 세밀한 윤곽선 유지, 건축/제품 디자인
강점: 디테일한 형태 보존
\`\`\`

### 2. Depth
\`\`\`settings
특징: 3D 공간 깊이 정보
용도: 풍경, 인테리어, 원근감 중요한 이미지
강점: 전경/배경 관계 유지
\`\`\`

### 3. OpenPose
\`\`\`settings
특징: 인체 골격 감지
용도: 캐릭터 포즈 제어
강점: 손, 다리, 머리 위치 정확한 재현
\`\`\`

### 4. Scribble
\`\`\`settings
특징: 손그림 스케치 인식
용도: 간단한 낙서를 완성된 이미지로
강점: 빠른 아이디어 시각화
\`\`\`

## ControlNet 선택 가이드

- 다양한 타입으로 **다양한 제어 방식** 제공

### Scribble ControlNet 실습 핵심
- **간단한 스케치**로 완성도 높은 이미지 생성
- **강도 조절**로 제어 수준 설정
- **반복 수정**을 통한 최적화

## OpenPose ControlNet 소개

OpenPose는 인체의 포즈를 스켈레톤 형태로 추출하여 AI 이미지 생성에 적용하는 강력한 ControlNet입니다.

### OpenPose의 핵심 특징
- 18개 관절점으로 인체 구조 표현
- 얼굴, 손 디테일 추가 가능
- 실시간 포즈 편집 지원
- 다양한 포즈 라이브러리 활용

## Canny ControlNet 이해

Canny는 이미지의 엣지(윤곽선)를 검출하여 정확한 형태를 유지하는 ControlNet입니다.  
건축물, 제품 디자인, 정밀한 형태 재현에 탁월합니다.

### Canny의 특징
- 샤프한 엣지 검출
- 디테일한 윤곽선 보존
- 구조적 정확성
- 스타일 변환에 최적

### Canny Edge Detection 원리
\`\`\`settings
1. 가우시안 블러로 노이즈 제거
2. 그래디언트 계산으로 엣지 강도 측정
3. Non-maximum suppression
4. Double threshold로 엣지 확정
\`\`\`

## Depth ControlNet 이해

Depth는 이미지의 깊이 정보를 활용하여 3D 공간감을 유지합니다.  
풍경, 인테리어, 공간 구성에 강력합니다.

### Depth의 특징
- 원근감 보존
- 공간 관계 유지
- 전경/배경 분리
- 3D 구조 재현

### Depth Map 생성 방식
\`\`\`settings
MiDaS: 모노큘러 깊이 추정
DPT: 트랜스포머 기반
ZoeDepth: 메트릭 깊이
LeReS: 고해상도 깊이
\`\`\`

## 복합 ControlNet 개념

여러 ControlNet을 동시에 사용하여 이미지 생성을 다차원적으로 제어합니다.  
각 ControlNet의 장점을 결합하여 더욱 정밀하고 창의적인 결과를 얻을 수 있습니다.

### 복합 사용의 장점
- 다중 제약 조건 동시 만족

## Live Portrait 소개

Live Portrait는 얼굴 표정과 머리 움직임을 정밀하게 제어하는 혁신적인 기술입니다.  
원본 영상이나 이미지의 표정을 다른 캐릭터에 자연스럽게 전달할 수 있습니다.

### Live Portrait의 핵심 기능
- 실시간 표정 전이
- 눈, 입, 눈썹 개별 제어
- 머리 회전 및 기울기
- 감정 표현 매핑
- 비디오 표정 추출

---

## Live Portrait 매개변수 설명

Live Portrait의 Expression Editor 노드에서 사용하는 주요 매개변수들입니다.

### 머리 움직임 (Head Movement)
| 매개변수 | 설명 | 예시 |
|---------|------|------|
| rotate_pitch | 고개 상하 움직임 | -20: 고개를 위로 젖힘, +20: 고개를 아래로 숙임 |
| rotate_yaw | 고개 좌우 회전 | -20: 왼쪽으로, +20: 오른쪽으로 |
| rotate_roll | 목 기울기 | -20: 왼쪽으로 목을 꺾음, +20: 오른쪽으로 목을 꺾음 |

### 눈 제어 (Eyes)
| 매개변수 | 설명 | 예시 |
|---------|------|------|
| blink | 눈 감기 | -20 ~ 5 범위, -20: 눈을 완전히 감음, 5: 눈을 크게 뜸 |
| eyebrow | 눈썹 위치 | -: 눈썹이 쳐짐, +: 눈썹을 들어 올림 |
| wink | 윙크 | 한쪽 눈만 감기 |
| pupil_x | 눈동자 좌우 | -15: 왼쪽, +15: 오른쪽 |
| pupil_y | 눈동자 상하 | -15: 아래쪽, +15: 위쪽 |

### 입 모양 (Mouth Shape)
| 매개변수 | 설명 | 예시 |
|---------|------|------|
| aaa | 입 세로 벌림 | +: 입벌림 (아), -: 윗입술을 누르듯이 |
| eee | 입 좌우 벌림 | +: 이 (이빨 보임), -: 입술을 모음 |
| woo | 입 앞으로 내밈 | +: 입을 모음 (우), -: 아랫입술을 아래로 내림 |

**입 모양 조합 예시**:
- '오' 발음: aaa 30, eee -20, woo 15

### 표정 제어 (Expression)
| 매개변수 | 설명 | 예시 |
|---------|------|------|
| smile | 웃음 정도 | +: 광대와 눈밑이 올라가며 웃는 느낌, -: 무표정 |
| src_ratio | 원본 표정 반영 비율 | 0: 원본 표정 무시하고 설정값만 사용, 1: 원본 표정 유지 |
| sample_ratio | 샘플 표정 반영 비율 | 0 ~ 1 범위 |

## 프롬프트 엔지니어링이란?

프롬프트 엔지니어링은 AI가 원하는 이미지를 생성하도록 명령어를 최적화하는 기술입니다.

### 핵심 개념

**1. 가중치 시스템**:
- 괄호로 강조: \`(keyword)\` = 1.1배, \`((keyword))\` = 1.21배
- 정확한 값 지정: \`(keyword:1.3)\` 형태
- 대괄호로 약화: \`[keyword]\` = 0.9배
- 실전 권장: 주요 피사체 1.2~1.4, 스타일 1.1~1.2

**2. 2025년 네거티브 프롬프트 전략**:
- **FLUX 모델**: 네거티브 거의 불필요, 자연어로 "avoid" 표현 사용
- **SDXL 모델**: 최소한의 네거티브만 사용 (기존 대비 80% 단축)
- **SD 1.5 모델**: 여전히 상세한 네거티브 프롬프트 필요
- 모델별로 전략이 완전히 다르므로 주의

**3. 와일드카드 활용**:
- Combinational Prompts 노드 사용
- \`{option1|option2|option3}\` 형식으로 랜덤 선택
- 다양한 변형 이미지를 자동 생성
- 예시: \`{woman|man}, {blonde|brunette|red} hair\`

**4. 카메라 구도와 촬영 기법**:
- 프레이밍: Single Shot, Two Shot, POV Shot 등
- 샷 크기: Close-Up, Medium Shot, Long Shot 등
- 촬영 각도: Eye-Level, Low-Angle, High-Angle 등
- 초점: Shallow Depth of Field, Bokeh 등
- 조명: Three-Point Lighting, Rim Lighting 등

**5. 모델별 최적화**:
- **FLUX**: 자연어 기반, 긴 프롬프트 효과적
- **SDXL**: 균형잡힌 구조화, 품질 키워드 효과 높음
- **SD 1.5**: 키워드 나열식, 가중치 적극 활용

**6. 고급 프롬프트 구조**:
- [품질 키워드] + [주체 설명] + [스타일 지정] + [구도/시점] + [조명/분위기] + [세부 디테일] + [기술적 키워드]
- 카테고리별 키워드 데이터베이스 활용
- 조명 및 분위기 키워드 체계적 사용

## VAE (Variational Autoencoder) 이해

VAE는 잠재 공간(latent space)의 데이터를 실제 이미지로 변환하는 핵심 컴포넌트입니다.  
최종 이미지 품질에 결정적인 영향을 미칩니다.

### VAE의 역할
\`\`\`settings
Encoder: 이미지 → 잠재 공간 압축
Decoder: 잠재 공간 → 이미지 복원
품질 결정: 색상, 선명도, 디테일
\`\`\`

### VAE 처리 과정
\`\`\`settings
1. K-Sampler가 잠재 공간에서 작업
2. VAE Decoder가 픽셀 이미지로 변환
3. 색상 및 디테일 복원
4. 최종 이미지 출력
\`\`\`

## IP-Adapter란?

IP-Adapter(Image Prompt Adapter)는 참조 이미지를 활용하여 AI 생성 이미지의 스타일을 제어하는 기법입니다.
기존 체크포인트나 LoRA 모델 없이도 단일 참조 이미지만으로 원하는 스타일을 적용할 수 있습니다.

### 주요 특징
- 텍스트 프롬프트와 이미지 참조의 결합
- 별도 모델 다운로드 불필요
- 실시간 스타일 참조 적용
- 다양한 Weight 조정 옵션

---

## Weight 값 조정의 효과

### Weight 0.8 (높은 값)
- 참조 이미지의 스타일이 강하게 반영
- 원본 참조 이미지와 유사한 색상과 분위기
- 프롬프트보다 이미지 참조가 우선

### Weight 0.2 (낮은 값)
- 프롬프트 위주의 생성
- 참조 이미지는 약하게 반영
- 원본 프롬프트의 의도가 더 명확히 표현

### Weight 0.1 (매우 낮은 값)
- 참조 이미지의 영향 최소화
- 거의 프롬프트만으로 생성
- 미묘한 스타일 힌트 정도만 적용

\`\`\`settings
권장 Weight 범위: 0.1 ~ 1.0
초보자 권장값: 0.3 ~ 0.6
실험용 권장값: 0.1, 0.2, 0.8 비교 테스트
\`\`\`

## 비디오 생성의 원리

### 기본 개념
비디오 생성은 **프레임별 이미지들을 생성하고 연결하여 동영상을 구현**하는 방식입니다.

### 프레임과 영상 길이 계산
\`\`\`
예시: 90프레임 ÷ 30fps (frames per second) = 3초
\`\`\`

- **프레임 수**: 생성할 이미지 개수
- **FPS**: 초당 재생 프레임 수
- **영상 길이**: 프레임 수 ÷ FPS

각 프레임은 독립적인 이미지로 생성되며, 프레임 간 일관성 유지가 핵심입니다.

---

## 주요 비디오 생성 모델

### 1. Wan (Wan 2.1)

Alibaba의 오픈소스 모델로, 빠른 생성 속도와 가벼운 리소스 요구사항(8GB VRAM)이 특징입니다. 중국어/영어 텍스트 생성을 지원하며, 실시간 움직임과 카메라 모션에 강점을 보입니다.

### 2. LTXV (LTX-Video)

Lightricks의 초고속 모델로, 5초 비디오를 2초만에 생성할 수 있습니다(실시간보다 빠름). Text-to-Video, Image-to-Video, Video-to-Video 등 다양한 입력 방식을 지원하며, 소비자용 GPU에서도 실행 가능합니다.

### 3. HunYuan Video

Tencent의 최고 품질 모델(13B 파라미터)로, 전문가 평가에서 최고 점수를 기록했습니다. 720p~1280p 고해상도를 지원하며, 비디오-오디오 자동 동기화 기능이 내장되어 있습니다.

## 4단계: 두 방식의 차이점 이해하기

---

### Basic 업스케일 방식

**작동 원리:**
- RealESRGAN 업스케일러 모델 사용
- 이미지 확대 노드로 생성된 이미지를 **그대로 확대**
- 단순하고 빠른 처리

**워크플로우 구조:**
\`\`\`
KSampler → VAE Decode → Upscale Image → Save Image
\`\`\`

**특징:**
- 빠른 처리 속도
- 기존 이미지의 디테일 보존
- 추가 생성 과정 없음

---

### Hires Fix 업스케일 방식

**작동 원리:**
1. RealESRGAN 업스케일러로 이미지 확대
2. **VAE Encode** 노드로 이미지를 다시 **데이터(Latent) 형태로 변환**
3. 변환된 Latent를 **KSampler에 투입하여 다시 생성**

**워크플로우 구조:**
\`\`\`
KSampler → VAE Decode → Upscale Image →
VAE Encode → KSampler → VAE Decode → Save Image
\`\`\`

**특징:**
- 디테일 추가 생성
- 더 선명한 결과물
- 처리 시간이 더 소요됨

---

### VAE Encode와 Decode의 관계

**복습: VAE Decode**
- KSampler의 산출물 (Latent 데이터)을 **이미지로 변환**
- Latent → Image

**VAE Encode**
- VAE Decode의 **반대 방향**으로 작동
- 이미지를 다시 **Latent 데이터로 변환**
- Image → Latent

**Hires Fix에서의 활용:**
- 업스케일된 이미지를 다시 Latent로 변환
- KSampler가 이 Latent를 받아서 디테일을 추가 생성
- 결과적으로 더 선명하고 디테일한 이미지 획득

---

**Basic 방식**

---

**Hires Fix 방식**
- 장점: 디테일 추가 생성, 더 선명한 결과
- 단점: 처리 시간 소요

## 핵심내용

### XY Plot 시스템 개념
XY Plot은 2차원 그리드 배열을 통해 매개변수를 체계적으로 비교하는 강력한 분석 도구입니다.

**기본 원리**:
- X축과 Y축에 서로 다른 변수를 설정
- 한 번의 실행으로 모든 조합을 자동 테스트
- 그리드 형태로 결과를 직관적으로 비교
- 매개변수 간의 상호작용 효과 분석

**주요 장점**:
- 시간 효율성: 수십 개 조합을 한 번에 테스트
- 체계적 분석: 변수별 영향도 명확히 파악
- 결과 비교: 그리드 상단 타이틀로 변수 확인 가능
- 최적화 지원: 최고 품질 조합 식별

### 효율적인 노드 구성

#### Efficient Loader 활용
기존 체크포인트 로더를 Efficient Loader로 교체하여 관리를 간소화합니다.

\`\`\`settings
노드 변경: Checkpoint Loader → Efficient Loader
기능: 체크포인트, VAE, LoRA 통합 관리
장점: 연결선 정리, 인터페이스 단순화
\`\`\`

#### KSampler Efficient 적용
기존 K-Sampler를 KSampler Efficient로 교체하여 매개변수를 통합 관리합니다.

\`\`\`settings
노드 변경: KSampler → KSampler Efficient
통합 기능: 샘플링 설정, 시드 관리
연동성: XY Plot과 완벽 호환
\`\`\`

## 나노바나나(Nano Banana)란?

**나노바나나**는 Google의 **Gemini 2.5 Flash Image** 모델의 별칭입니다.
2025년에 출시된 최신 이미지 생성 AI로, 놀라운 품질과 빠른 속도로 주목받고 있습니다.

## ComfyUI에서 나노바나나 시작하기

### Gemini API 키 발급 방법

나노바나나를 사용하기 위해서는 Google Gemini API 키가 필요합니다.

**1단계: Google AI Studio 접속**

https://aistudio.google.com 에 접속합니다.

**2단계: 프로젝트 가져오기**

- **기존 프로젝트가 있는 경우**: default 프로젝트 또는 원하는 프로젝트를 선택합니다
- **프로젝트가 없는 경우**: 아래 3단계를 따라 새 프로젝트를 생성합니다

**3단계: 새 프로젝트 만들기 (프로젝트가 없을 경우)**

1. 왼쪽 메뉴에서 Dashboard 아래 **"프로젝트"** 클릭
2. 우측 상단의 **"새 프로젝트 만들기"** 클릭
3. 프로젝트 생성 완료

**4단계: API 키 만들기**

1. 왼쪽 메뉴에서 **"API 키"** 탭 클릭
2. 우측 상단의 **"API 키 만들기"** 클릭
3. 가져온 프로젝트 선택에서 선택 가능한 프로젝트가 있으면 확인

**5단계: API 키 복사**

1. 생성된 키 목록에서 왼쪽의 **"키"** 부분의 하늘색 글자를 클릭
2. API 키를 복사하여 **메모장 등에 붙여넣어 보관**합니다

---

### 트러블슈팅: Generation Fail (회색 에러)

이미지 생성 시 **회색 에러(Generation Fail)**가 발생하는 경우:

1. Google AI Studio의 **API 키 대시보드**로 이동
2. **"할당량 등급"**이 **Tier 1**이 될 때까지 하늘색 글자를 클릭
3. **결제 계정 활성화** 진행
   - "결제계정 등록" 또는 "결제 활성화" 클릭
   - **Activate** 버튼 클릭하여 활성화 완료

---

### (선택) 예산 설정하기 - 무료 크레딧이 없는 경우

구글 신규 계정이 아닐 경우 무료 크레딧이 적용되지 않을 수 있습니다.
예상치 못한 요금 발생을 방지하려면 예산을 설정하세요.

1. **Google Cloud 결제 계정 대시보드** 접속
2. **"예산 및 알림"** 클릭
3. **"예산 만들기"** 클릭
4. **목표 금액**: 500원으로 설정

> **참고**: 실습 이후 300~500원 정도(10~20장 생성 기준) 등록한 카드로 결제가 이루어질 수 있습니다

## 1. Get/Set 노드란?

복잡한 워크플로우에서 노드들을 연결하다 보면 화면이 연결선으로 가득 차서 보기 어려워집니다. **Get/Set 노드**는 이런 문제를 해결해주는 KJNodes의 기능으로, 연결선 없이 데이터를 전달할 수 있게 해줍니다.

**RunDiffusion에서는 KJNodes가 기본으로 설치**되어 있습니다.

### 기본 개념

- **Set 노드**: 데이터를 전역 변수에 저장
- **Get 노드**: 저장된 데이터를 가져와서 사용
- **변수명**: Set과 Get을 연결하는 이름

### 왜 사용하나요?

**기존 방식의 문제:**
\`\`\`
[노드 A] ────────────────────────────> [노드 B]
           (긴 연결선이 화면 가로지름)
\`\`\`

**Get/Set 방식:**
\`\`\`
[노드 A] → [Set: output_image]

[Get: output_image] → [노드 B]
        (연결선 없이 깔끔)
\`\`\`

---

## 2. ToBasicPipe / FromBasicPipe 노드

**RunDiffusion에서는 Impact-Pack 커스텀 노드가 기본으로 설치**되어 있습니다.

### 역할

여러 매개변수를 하나의 파이프로 묶어서 전달하는 노드입니다.

**ToBasicPipe 입력:**
- model
- clip
- vae
- positive (conditioning)
- negative (conditioning)

**ToBasicPipe 출력:**
- basic_pipe (하나로 묶인 데이터)

### 사용 예시

**복잡한 방식:**
\`\`\`
[Checkpoint Loader] → model → [KSampler]
                    → clip → [CLIP Text Encode]
                    → vae → [VAE Decode]
\`\`\`

**파이프 방식:**
\`\`\`
[Checkpoint Loader] + [CLIP Text Encode]
  → [ToBasicPipe]
  → [Set: base_pipe]

[Get: base_pipe]
  → [FromBasicPipe]
  → [KSampler]
\`\`\`

---

## 3. SDXLResolution 노드

**RunDiffusion에서는 ComfyMath 커스텀 노드가 기본으로 설치**되어 있습니다.

### 역할 및 기능

SDXL 모델은 권장 해상도(가로세로 픽셀 비율)가 정해져 있습니다. 이 값들을 외우기 어렵기 때문에, SDXLResolution 노드는 9가지 권장 해상도 중 선택하여 width와 height로 출력해줍니다.

### 사용 방법

1. SDXLResolution 노드 추가
2. 드롭다운에서 원하는 비율 선택 (1:1, 16:9, 9:16 등)
3. width, height 출력을 Empty Latent Image 노드에 연결

---

## 4. 노드 그룹화 기법

ComfyUI 자체 기능으로 여러 노드를 하나의 그룹으로 변환할 수 있습니다.

### 그룹화 방법

**1단계: 노드 선택**
- **Ctrl** 키를 누른 채로 드래그
- 또는 여러 노드를 Ctrl + 클릭으로 개별 선택

**2단계: 그룹 노드로 변환**
- 선택된 노드 위에 뜨는 토글의 오른쪽 **...** 클릭
- **"그룹 노드로 변환"** 버튼 클릭

**결과:**
- 노드들의 input, output, 매개변수 리스트가 하나로 합쳐짐
- 화면이 깔끔하게 정리됨

### 주의사항

**그룹화 시 주의할 점:**
- input/output/매개변수 이름이 겹치면 에러 발생 가능
- 기능이 혼합될 경우 문제가 생길 수 있음
- **복잡한 노드끼리는 그룹화하지 않는 것을 권장**
- 화면 정리가 꼭 필요한 경우에만 사용

**예시: KSampler + 빈 잠재 이미지 노드 그룹화**
- 간단한 노드 조합이므로 그룹화 적합
- 자주 함께 사용되는 노드끼리 묶기

---

## 5. 노드 프레임 만들기

노드를 시각적으로 구분하는 프레임 기능입니다.

### 프레임 만들기

**1단계: 노드 선택**
- **Ctrl** 키를 누른 채로 드래그
- 또는 여러 노드를 Ctrl + 클릭으로 개별 선택

**2단계: 프레임 생성**
- 선택된 노드 위에 뜨는 토글의 **우물정(井) 아이콘** 클릭
- 노드들이 프레임으로 묶임

**3단계: 프레임 활용**
- 프레임의 **제목 부분을 드래그**하면 프레임 안의 노드들이 **함께 이동**
- 프레임 제목을 수정하여 구역 이름 지정 가능

## 1단계: Civitai에서 참고 이미지 탐색하기

### Civitai 접속

https://civitai.com/images 에 접속하여 원하는 이미지를 탐색합니다.

(https://civitai.com/models 에서 체크포인트 모델, 혹은 로라 모델에서 생성된 이미지를 참고하는 것도 좋습니다)

(시연용 예시: https://civitai.com/images/105765701)

### 필터 설정 (중요!)

이미지 탐색 시 다음 조건을 반드시 확인하세요:

**Base Model 선택**
- **SD 1.5** 또는 **SDXL** 기반 이미지만 선택
- Filter 메뉴에서 Base Model 설정 가능

**필수 정보 확인**
- 체크포인트 모델 정보가 있는지 확인
- LoRA 정보가 있는지 확인
- 프롬프트가 공개되어 있는지 확인
- 매개변수 (CFG Scale, Seed 등)가 있는지 확인

**용량 제한 유의**
- 체크포인트 + LoRA 파일 총합이 **10GB를 넘지 않도록** 주의
- RunDiffusion 용량 제한으로 인한 제약사항
- 큰 모델은 다운로드가 제한될 수 있음

---section---

## 2단계: 워크플로우 구성하고 재현하기

### 모델 다운로드 및 세팅

**1. 체크포인트 다운로드**
- Civitai에서 선택한 이미지의 체크포인트 확인
- RunDiffusion에서 해당 모델 다운로드 또는 로드

**2. LoRA 다운로드**
- 사용된 LoRA 모델 확인 및 다운로드
- LoRA 강도(Weight) 값도 함께 확인

---

### 노드 직접 구성하기

이미지 정보를 바탕으로 **직접 노드를 배치**하여 워크플로우를 만들어보세요.

**기본 노드 구성**
1. Load Checkpoint
2. CLIP Text Encode (Prompt)
3. KSampler (매개변수 설정)
4. VAE Decode
5. Save Image

**LoRA 노드 추가**
- Load LoRA 노드 추가
- Weight 값 설정

---

### 생성 결과 확인하기

**시드 고정 및 테스트**
- Civitai 이미지의 **Seed 값**을 동일하게 설정
- Queue Prompt 실행하여 결과 확인

**이미지 사이즈 체크**
- 생성된 이미지를 새 탭에서 열기
- **F12** 개발자 도구 실행
- 컴포넌트 선택자로 이미지 크기 확인
- 원본과 동일한 해상도인지 비교

---section---

## 3단계: 워크플로우 디벨롭하기

이제 원본을 재현했다면, 다양한 방식으로 발전시켜보세요!

### 이미지가 잘 생성된 경우

원하는 결과가 나왔다면 다음과 같이 응용해보세요:

**포즈 제어 추가**
- OpenPose ControlNet 추가
- 원하는 포즈로 변경 실험

**LoRA 변경 및 조합**
- 다른 LoRA로 교체하여 스타일 변경
- 여러 LoRA를 동시에 사용

**이미지 합성**
- Image-to-Image 기법 적용
- IPAdapter로 스타일 전이

### 이미지가 잘 유지되지 않는 경우

원본과 다른 결과가 나온다면:

**형태 유지를 위한 ControlNet 활용**
- **Depth ControlNet**: 깊이 정보로 형태 유지
- **Canny ControlNet**: 윤곽선 정보로 구조 유지
- 원본 이미지를 참조 이미지로 사용

**프롬프트 조정**
- 프롬프트를 더 구체적으로 작성
- Negative Prompt 추가
- Weight 값 조정

---section---

## 4단계: 자유 실습

이제 배운 내용을 바탕으로 자유롭게 이미지를 만들어보세요!

---section---

## 💡 팁: PNG 메타데이터 활용하기

ComfyUI로 생성한 PNG 이미지에는 **워크플로우와 메타데이터가 포함**되어 있는 경우가 많습니다.
이를 활용하면 다른 사람의 워크플로우를 빠르게 가져올 수 있습니다!

### 활용 방법
1. Civitai 등에서 마음에 드는 이미지를 다운로드합니다
2. 다운로드한 PNG 이미지를 ComfyUI 화면에 **드래그 앤 드롭**합니다
3. 워크플로우가 자동으로 로드됩니다!

### 예시
- [Civitai 이미지 예시](https://civitai.com/images/103956588)

---section---

## 팁과 주의사항

**효율적인 실습을 위한 팁**

**시드 고정의 중요성**
- 실험 시 Seed를 고정하면 변화를 명확히 비교할 수 있음
- 만족스러운 결과가 나오면 Seed 값 기록

**단계적 변경**
- 한 번에 여러 요소를 바꾸지 말 것
- 하나씩 변경하며 영향 파악

**용량 관리**
- 모델 다운로드 전 용량 확인
- 불필요한 모델은 삭제

**트러블슈팅**

**이미지가 너무 다르게 나올 때**
- Seed 값 재확인
- 프롬프트 정확히 복사했는지 확인
- 체크포인트 버전 확인

**Out of Memory 에러**
- 이미지 해상도를 낮춰서 시도
- 배치 사이즈 줄이기
- 모델 언로드 후 재시도

## 컴퓨터 사양 확인하기

로컬에서 ComfyUI를 사용하려면 그래픽 카드(GPU)의 VRAM 용량을 먼저 확인해야 합니다.

### GPU 확인 방법

[[image: dxdiag.jpg | width:800]]

1. Windows 키 누르기
2. **"dxdiag"** 입력 및 실행
3. **"디스플레이 1"** 탭 클릭
4. 그래픽 카드 모델 확인

---

## Stability Matrix란?

ComfyUI를 로컬 PC에 **간편하게 설치하고 관리**할 수 있는 올인원 패키지 매니저입니다.

### 주요 장점

- **원클릭 설치** (Python, Git 자동 설치)
- **포터블 모드** 지원 (USB에 담아 이동 가능)
- 모델 및 커스텀 노드 관리 간편
- 여러 UI 통합 관리 (ComfyUI, Automatic1111 등)

---

## 설치 과정

### 1단계: Stability Matrix 다운로드

**공식 사이트**: https://github.com/LykosAI/StabilityMatrix/releases

1. 최신 버전 **"StabilityMatrix-win-x64.zip"** 다운로드
2. ZIP 파일 압축 해제
3. 원하는 위치로 이동
   - 권장: \`C:\\StabilityMatrix\`
   - ⚠️ 한글 경로 피하기

### 2단계: Stability Matrix 실행

1. **StabilityMatrix.exe** 파일 실행
2. 첫 실행 시 초기 설정 화면 표시

### 3단계: 포터블 모드 설정

1. **"Portable Mode"** 체크박스 선택
   - 폴더만 복사하면 다른 PC에서도 사용 가능
2. **"Continue"** 클릭

### 4단계: ComfyUI 패키지 설치

1. **"Packages"** 탭 클릭
2. **"Add Package"** 버튼 클릭
3. **"ComfyUI"** 선택
4. 설치 옵션 설정
   - Package Name: \`ComfyUI\`
   - Version: \`Stable\` (안정 버전 권장)
5. **"Install"** 클릭
6. 자동 설치 완료 대기
7. **"Launch"** 버튼으로 ComfyUI 실행

**기본 주소**: http://127.0.0.1:8188

### 5단계: ComfyUI Manager 설치

ComfyUI Manager는 커스텀 노드를 쉽게 관리할 수 있는 필수 확장입니다.

1. ComfyUI 화면 우측 **퍼즐 아이콘** 클릭
2. **"Install Extensions"** 클릭
3. 검색창에 **"manager"** 입력
4. **Dr.Lt.data**의 **"ComfyUI-Manager"** 찾기
5. **"Install"** 클릭
6. **ComfyUI 재시작** (브라우저 새로고침)
7. 화면 우측에 **Manager** 버튼 확인

**굵은 글씨**로 강조할 수도 있고, \`인라인 코드\`도 사용할 수 있습니다.

\`\`\`prompt
이것은 프롬프트 코드블록입니다.
여러 줄로 작성할 수 있습니다.
\`\`\`

`,"test/width-test.md":`# Width 옵션 테스트

이 문서는 이미지 width 옵션이 정상적으로 작동하는지 테스트합니다.

---

## 테스트 1: width:20% (작은 크기)

작은 아이콘 크기입니다.

[[image: vae.jpg | width:20%]]

---

## 테스트 2: width:50% (중간 크기)

중간 크기 이미지입니다.

[[image: 2_controlnet.jpg | width:50%]]

---

## 테스트 3: width:80% (큰 크기 - 기본값과 동일)

기본값과 동일한 크기입니다.

[[image: controlnet.png | width:80%]]

---

## 테스트 4: width:100% (전체 너비)

화면 전체 너비를 사용합니다.

[[image: comfyui.PNG | width:100%]]

---

## 테스트 5: width 옵션 없음 (기본값 80%)

width 옵션이 없으면 기본값 80%가 적용됩니다.

[[image: ksampler.PNG]]

---

## 테스트 6: width:5% (최소값 보정)

5%는 너무 작으므로 10%로 자동 보정됩니다.

[[image: lora.PNG | width:5%]]

---

## 테스트 7: width:150% (최대값 보정)

150%는 너무 크므로 100%로 자동 보정됩니다.

[[image: stablediffusion.PNG | width:150%]]

---

## 테스트 8: width + align 조합

width와 align을 함께 사용할 수 있습니다.

[[image: denoising1.PNG | width:60% | align:center | 중앙 정렬 60% 이미지]]

---

## 테스트 9: 잘못된 형식 (px 단위)

px 단위는 무시되어 기본 마크다운으로 표시됩니다.

[[image: embed.PNG | width:500px]]

---

## 테스트 10: 다양한 크기 비교

여러 이미지를 다양한 크기로 표시합니다.

[[image: checkpoint.PNG | width:30%]]

[[image: i2i_sample.png | width:60%]]

[[image: word-chain.PNG | width:90%]]

---

**테스트 완료**

모든 이미지가 지정된 너비로 정상 표시되어야 합니다.
